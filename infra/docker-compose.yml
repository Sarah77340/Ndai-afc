version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: infra-postgres-1
    environment:
      POSTGRES_USER: ndai
      POSTGRES_PASSWORD: ndai
      POSTGRES_DB: ndai
    ports:
      - "5432:5432"
    volumes:
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndai -d ndai"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: infra-minio-1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: infra-zookeeper-1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: infra-kafka-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # INTERNAL pour Spark/API dans Docker, EXTERNAL pour localhost
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      #KAFKA_ADVERTISED_LISTENERS: INTERNAL://infra-kafka-1:9092,EXTERNAL://localhost:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  metabase:
    image: metabase/metabase:latest
    container_name: infra-metabase-1
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  api-feedback:
    build:
      context: ../services/api-feedback
    container_name: infra-api-feedback-1
    environment:
      API_KEY: ${API_KEY}
      BASIC_USER: ${BASIC_USER}
      BASIC_PASS: ${BASIC_PASS}
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: feedback.created
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET_RAW: raw-feedback
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - kafka
      - minio
      - postgres

  # ---- Airflow metadata DB ----
  postgres-airflow:
    image: postgres:16
    container_name: infra-postgres-airflow-1
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ---- Airflow init (DB migrate + create admin user) ----
  airflow-init:
    build: .
    container_name: airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: fernet_key
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../:/opt/airflow/repo
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    build: .
    container_name: airflow-webserver
    restart: always
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: fernet_key
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../:/opt/airflow/repo
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    restart: always
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: fernet_key
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../:/opt/airflow/repo
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler

  translator:
    image: libretranslate/libretranslate:latest
    container_name: infra-translator-1
    environment:
      LT_LOAD_ONLY: en,fr,es,de,it,pt,ar,zh,ja,hi
    ports:
      - "5000:5000"

  consumer-feedback:
    build:
      context: ../services/consumer-feedback
      dockerfile: Dockerfile
    container_name: infra-consumer-feedback-1
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: feedback.created
      KAFKA_GROUP_ID: consumer-feedback
      KAFKA_OFFSET_RESET: earliest

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ndai
      POSTGRES_USER: ndai
      POSTGRES_PASSWORD: ndai

      TRANSLATOR_URL: http://translator:5000
      TRANSLATE_TIMEOUT: 45
      SUPPORTED_LANGS: en,fr,es,de,it,pt,ar,zh,ja,hi

      POS_THRESHOLD: 0.05
      NEG_THRESHOLD: -0.05
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      translator:
        condition: service_started

